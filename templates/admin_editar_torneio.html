{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>✏️ Editar Torneio</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nome do Torneio *</label>
            <input type="text" name="nome" value="{{ torneio.nome }}" required>
        </div>
        <div class="form-group">
            <label>Endereço do Evento</label>
            <input type="text" name="endereco" value="{{ torneio.endereco or '' }}">
        </div>
        <div class="form-group">
            <label>Link do Mapa (Google Maps)</label>
            <input type="url" name="mapa_url" value="{{ torneio.mapa_url or '' }}">
        </div>
        <button type="submit" class="btn btn-dourado" style="width: 100%;">Salvar Alterações</button>
    </form>
    <div class="text-center mt-20">
        <a href="{{ url_for('admin_ver_torneio', torneio_id=torneio.id) }}" class="btn btn-outline btn-sm">Voltar</a>
    </div>
</div>
{% endblock %}
