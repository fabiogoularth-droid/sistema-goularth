{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>👤 Criar Novo Administrador</h2>
    <p class="text-muted">Crie uma nova conta de administrador para o sistema.</p>
    <form method="POST">
        <div class="form-group">
            <label>Nome *</label>
            <input type="text" name="nome" value="{{ nome or '' }}" required>
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" value="{{ email or '' }}" required>
        </div>
        <div class="form-group">
            <label>Senha *</label>
            <input type="password" name="senha" required>
            <div class="hint">Mínimo 6 caracteres</div>
        </div>
        <div class="form-group">
            <label>Confirmar Senha *</label>
            <input type="password" name="confirmar_senha" required>
        </div>
        <button type="submit" class="btn btn-dourado" style="width: 100%;">Criar Administrador</button>
    </form>
    <div class="text-center mt-20">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline btn-sm">Voltar</a>
    </div>
</div>
{% endblock %}
