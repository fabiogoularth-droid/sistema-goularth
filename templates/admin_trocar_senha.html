{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>🔑 Trocar Senha do Admin</h2>
    <form method="POST">
        <div class="form-group">
            <label>Senha Atual</label>
            <input type="password" name="senha_atual" required>
        </div>
        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" name="nova_senha" required>
            <div class="hint">Mínimo 6 caracteres</div>
        </div>
        <div class="form-group">
            <label>Confirmar Nova Senha</label>
            <input type="password" name="confirmar_senha" required>
        </div>
        <button type="submit" class="btn btn-dourado" style="width: 100%;">Alterar Senha</button>
    </form>
    <div class="text-center mt-20">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline btn-sm">Voltar</a>
    </div>
</div>
{% endblock %}
