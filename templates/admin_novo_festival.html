{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>🎪 Criar Novo Festival</h2>
    <p class="text-muted">Evento avulso, sem vínculo a nenhum torneio.</p>
    <form method="POST">
        <div class="form-group">
            <label>Nome do Festival *</label>
            <input type="text" name="nome" placeholder="Ex: Festival de Primavera 2026" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Modalidade *</label>
                <select name="modalidade" required>
                    <option value="">Selecione</option>
                    <option value="FIBRA">Fibra</option>
                    <option value="CANTO_LIVRE">Canto Livre</option>
                </select>
            </div>
            <div class="form-group">
                <label>Categoria *</label>
                <select name="categoria" required>
                    <option value="">Selecione</option>
                    <option value="FILHOTE">Filhote</option>
                    <option value="ADULTO">Adulto</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Data do Festival *</label>
            <input type="date" name="data_etapa" required>
        </div>
        
        <div class="form-group">
            <label>Prazo de Inscrição</label>
            <input type="datetime-local" name="prazo_inscricao">
            <div class="hint">Deixe em branco para não ter prazo</div>
        </div>
        
        <div class="form-group">
            <label>Limite de Pássaros por CPF</label>
            <input type="number" name="limite_por_cpf" placeholder="Ex: 2 (deixe vazio para livre)">
        </div>
        
        <div class="form-group">
            <label>Limite Total de Inscrições</label>
            <input type="number" name="limite_inscricoes" placeholder="Ex: 30 (deixe vazio para ilimitado)">
            <div class="hint">Número máximo de inscrições permitidas neste festival.</div>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; background: #6c757d; color: #fff;">Criar Festival</button>
    </form>
    <div class="text-center mt-20">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline btn-sm">Voltar</a>
    </div>
</div>
{% endblock %}
