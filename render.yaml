services:
  - type: web
    name: sistema-goularth
    runtime: python
    repo: https://github.com/SEU_USUARIO/SEU_REPOSITORIO
    plan: free
    branch: main
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-goularth-db
          property: connectionString

  - type: postgresql
    name: sistema-goularth-db
    plan: free